<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة تحميل الملفات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; max-width: 450px; width: 100%; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 24px; font-weight: 800; color: #58a6ff; margin-bottom: 6px; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: #8b949e; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #fff; font-size: 14px; outline: none; }
        input:focus { border-color: #58a6ff; }
        .btn-submit { width: 100%; padding: 14px; background: #238636; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-submit:hover { background: #2ea043; }
        
        /* شاشة التحميل تظهر بعد الإرسال فقط */
        #optionsScreen { display: none; text-align: center; }
        .success-msg { color: #3fb950; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        .btn-action { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; color: #fff; font-size: 14px; }
        .btn-download { background: #1f6beb; }
        .btn-whatsapp { background: #25D366; }
        .footer { margin-top: 20px; text-align: center; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

    <div class="card">
        <!-- 1. شاشة إدخال البيانات -->
        <div id="formScreen">
            <div class="header">
                <div class="brand">استمارة التحميل</div>
                <p style="font-size: 13px; color: #8b949e;">يرجى ملء البيانات أولاً لتتمكن من تحميل الملف</p>
            </div>
            <form id="mainForm" onsubmit="saveAndSubmitData(event)">
                <div class="form-group">
                    <label>الاسم بالكامل</label>
                    <input type="text" id="userName" required placeholder="أدخل اسمك الكريم">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف / الواتساب</label>
                    <input type="tel" id="userPhone" required placeholder="01xxxxxxxxx">
                </div>
                <button type="submit" class="btn-submit">حفظ البيانات واختيار التحميل 📥</button>
            </form>
        </div>

        <!-- 2. شاشة خيارات التنزيل (لا تفتح إلا بعد ملء الاستمارة) -->
        <div id="optionsScreen">
            <div class="header">
                <div class="brand">تم حفظ البيانات بنجاح</div>
                <div class="success-msg">✓ شكراً لك، يمكنك الآن تحميل أو إرسال الملف</div>
            </div>

            <!-- خيار التحميل المباشر -->
            <a href="design-file.png" download="Design_File.png" class="btn-action btn-download">
                📥 تحميل الملف مباشر على الجهاز
            </a>

            <!-- خيار الإرسال عبر واتساب -->
            <button class="btn-action btn-whatsapp" onclick="shareToWhatsApp()">
                📲 إرسال / مشاركة عبر واتساب
            </button>
        </div>

        <div class="footer">
            جميع الحقوق محفوظة &copy; 2026
        </div>
    </div>

    <script>
        function saveAndSubmitData(e) {
            e.preventDefault();
            
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;

            // حفظ البيانات في متصفح المستخدم (مؤقتاً)
            localStorage.setItem('userData', JSON.stringify({ name, phone }));

            // إخفاء الاستمارة وإظهار زر التحميل والواتساب
            document.getElementById('formScreen').style.display = 'none';
            document.getElementById('optionsScreen').style.display = 'block';
        }

        function shareToWhatsApp() {
            const savedData = JSON.parse(localStorage.getItem('userData')) || {};
            const textMsg = `مرحباً، تم تسجيل البيانات:\n- الاسم: ${savedData.name || ''}\n- الهاتف: ${savedData.phone || ''}\n\nرابط الملف: ${window.location.href}`;

            if (navigator.share) {
                navigator.share({
                    title: 'بيانات الملف',
                    text: textMsg,
                    url: window.location.href
                }).catch(() => {});
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(textMsg)}`, '_blank');
            }
        }
    </script>

</body>
</html>
