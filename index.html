<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة تفاصيل التصميم - Design Brief</title>
    <!-- مكتبة html2pdf لتوليد ملف الـ PDF فوراً -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; max-width: 550px; width: 100%; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        .brand { font-size: 24px; font-weight: 800; color: #58a6ff; margin-bottom: 6px; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: #8b949e; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #fff; font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: #58a6ff; }
        .btn-submit { width: 100%; padding: 14px; background: #238636; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.2s; }
        .btn-submit:hover { background: #2ea043; }
        
        /* شاشة النجاح والخيارات بعد الإرسال */
        #successSection { display: none; margin-top: 20px; text-align: center; }
        .btn-whatsapp { width: 100%; padding: 14px; background: #25D366; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .footer { margin-top: 20px; text-align: center; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

    <div class="card" id="pdfContent">
        <div class="header">
            <div class="brand">استمارة تفاصيل المشروع</div>
            <p style="font-size: 13px; color: #8b949e;">يرجى ملء البيانات التالية لحفظ وتصدير الملف</p>
        </div>

        <!-- الفيلدات والفورم بتفتح مباشرة -->
        <form id="designForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label>الاسم بالكامل</label>
                <input type="text" id="clientName" required placeholder="أدخل اسم العميل / الشركة">
            </div>
            
            <div class="form-group">
                <label>رقم الهاتف / الواتساب</label>
                <input type="tel" id="clientPhone" required placeholder="01xxxxxxxxx">
            </div>

            <div class="form-group">
                <label>تفاصيل التصميم / الطلب</label>
                <textarea id="projectDetails" rows="4" required placeholder="اكتب كل التفاصيل والشروط هنا..."></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">📄 حفظ وتوليد ملف PDF وحفظ البيانات</button>
        </form>

        <!-- يظهر فوراً بعد الضغط على إرسال -->
        <div id="successSection">
            <p style="color: #3fb950; font-weight: bold; margin-bottom: 10px;">✓ تم تحميل ملف الـ PDF بنجاح على جهازك!</p>
            <button class="btn-whatsapp" onclick="sendViaWhatsApp()">📲 إرسال التفاصيل عبر الواتساب</button>
        </div>

        <div class="footer">
            جميع الحقوق محفوظة &copy; 2026
        </div>
    </div>

    <script>
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'جاري إنشـاء الـ PDF... ⏳';
            btn.disabled = true;

            // 1. إنشاء وتحميل ملف الـ PDF تلقائياً
            const element = document.getElementById('pdfContent');
            const opt = {
                margin:       10,
                filename:     `Design_Brief_${Date.now()}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerText = '✓ تم الحفظ وتنزيل الـ PDF';
                document.getElementById('successSection').style.display = 'block';
            });
        }

        function sendViaWhatsApp() {
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const details = document.getElementById('projectDetails').value;

            const textMsg = `مرحباً، تم حفظ تفاصيل التصميم بنجاح:\n\n👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n📝 التفاصيل:\n${details}`;
            
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(textMsg)}`, '_blank');
        }
    </script>

</body>
</html>
